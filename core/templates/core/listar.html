<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Lista de Produtos - Tarefa 5</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        table { border-collapse: collapse; width: 100%; margin: 20px 0; }
        th, td { border: 1px solid #999; padding: 10px; text-align: left; }
        th { background-color: #f0f0f0; }
        a { margin-right: 8px; }
    </style>
</head>
<body>
    <h1>Lista de Produtos</h1>

    <form method="get" action="{% url 'buscar_produto' %}">
        <input type="text" name="q" placeholder="Buscar por nome...">
        <button type="submit">Buscar</button>
    </form>

    <p><a href="{% url 'criar_produto' %}">+ Novo Produto</a></p>

    <table>
        <tr>
            <th>Nome</th>
            <th>Descrição</th>
            <th>Preço</th>
            <th>Ações</th>
        </tr>
        {% for produto in produtos %}
        <tr>
            <td>{{ produto.nome }}</td>
            <td>{{ produto.descricao|default:'—' }}</td>
            <td>R$ {{ produto.preco }}</td>
            <td>
                <a href="{% url 'editar_produto' produto.pk %}">Editar</a> |
                <a href="{% url 'deletar_produto' produto.pk %}" onclick="return confirm('Deletar este produto?')">Deletar</a>
            </td>
        </tr>
        {% empty %}
        <tr><td colspan="4">Nenhum produto cadastrado ainda.</td></tr>
        {% endfor %}
    </table>

    <br>
    <a href="/admin/">→ Ir para o Admin do Django</a>
</body>
</html>
